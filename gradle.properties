VERSION_NAME=2.0.7
GROUP=io.github.umutcansu
android.useAndroidX=true
signing.required=false
# Disable automatic kotlin-stdlib injection by the Kotlin Gradle Plugin so
# we can pin a 1.9-metadata-compatible stdlib in pinvault/build.gradle.kts.
# Required because PinVault is compiled with Kotlin 2.1 but emits 1.9
# metadata for older consumer compilers.
kotlin.stdlib.default.dependency=false
