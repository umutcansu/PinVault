<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinVault - SSL Pin Manager</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">&#x1F512;</div>
      <div>
        <div class="app-title">PinVault</div>
        <div class="app-sub">SSL Pin Manager</div>
      </div>
    </div>

    <div class="sidebar-section" id="sidebar-hosts-label">Config API'ler</div>
    <div id="host-list" class="host-list">
      <div class="loading">Yükleniyor...</div>
    </div>
    <button class="btn-new" id="btn-add-api" onclick="showAddConfigApi()">+ Config API</button>

    <div class="sidebar-divider"></div>

<!-- V2: Vault Files are scoped per Config API.
         Access them via each Config API's detail page → "Vault" tab. -->

    <div class="sidebar-divider"></div>

    <div class="sidebar-footer">
      <div class="version-badge" id="version-badge" style="display:none"></div>
      <div class="force-status" id="force-status" style="display:none"></div>
      <div class="lang-toggle">
        <button class="lang-opt" id="lang-tr" onclick="setLang('tr')">TR</button>
        <button class="lang-opt" id="lang-en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div id="content">
      <div class="empty-state">
        <div class="empty-icon">&#x1F510;</div>
        <div class="empty-title" id="empty-title">Host seçin</div>
        <div class="empty-sub" id="empty-sub">Sol menüden bir host seçin veya yeni host ekleyin.</div>
      </div>
    </div>
  </main>

</div>
<script src="/static/app.js"></script>
</body>
</html>
